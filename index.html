<style>
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;
  --accent:#f0a500;--accent2:#3b82f6;--danger:#ef4444;--success:#22c55e;
  --warning:#f59e0b;--text:#e8eaf0;--text2:#8b90a7;--seco:#3b82f6;--humedo:#8b5cf6;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;font-size:14px;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;}
.auth-logo{font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
.auth-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:32px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:11px 14px;font-size:14px;outline:none;}
.field input:focus{border-color:var(--accent);}
.btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-sec{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;font-size:11px;cursor:pointer;}
.btn-sm{padding:6px 14px;font-size:12px;font-weight:600;border-radius:6px;border:none;cursor:pointer;}
.btn-approve{background:var(--success);color:#000;}
.btn-reject{background:var(--danger);color:#fff;}
.btn-submit{background:var(--accent);color:#000;}
.err{color:var(--danger);font-size:12px;margin-top:10px;text-align:center;}
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;font-weight:700;}
.topbar-role{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:var(--surface2);}
.role-supervisor{color:var(--accent);}
.role-qc1{color:var(--accent2);}
.role-qc2{color:var(--humedo);}
.role-fto{color:var(--success);}
.role-gerente{color:var(--warning);}
.role-admin{color:var(--danger);}
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-tab{padding:12px 18px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.main{flex:1;padding:16px;max-width:900px;margin:0 auto;width:100%;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.badge{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.badge-seco{background:rgba(59,130,246,0.18);color:var(--seco);}
.badge-humedo{background:rgba(139,92,246,0.18);color:var(--humedo);}
.badge-pendiente{background:rgba(139,144,167,0.15);color:var(--text2);}
.badge-ejecutado{background:rgba(245,158,11,0.18);color:var(--warning);}
.badge-qc1{background:rgba(59,130,246,0.18);color:var(--accent2);}
.badge-qc2{background:rgba(139,92,246,0.18);color:var(--humedo);}
.badge-fto{background:rgba(34,197,94,0.12);color:var(--success);}
.badge-aprobado{background:rgba(34,197,94,0.18);color:var(--success);}
.badge-observacion{background:rgba(239,68,68,0.18);color:var(--danger);}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:16px;}
.stat-box{background:var(--surface2);border-radius:var(--radius);padding:14px 12px;text-align:center;}
.stat-num{font-size:26px;font-weight:800;color:var(--accent);line-height:1;}
.stat-label{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;}
.progress-wrap{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden;margin-top:8px;}
.progress-bar{height:100%;border-radius:99px;background:var(--accent);}
.module-item{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;}
.module-item:hover{border-color:var(--border);}
.module-row{display:flex;align-items:center;justify-content:space-between;}
.module-name{font-size:13px;font-weight:700;}
.module-meta{font-size:11px;color:var(--text2);margin-top:3px;}
.partida-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border);}
.partida-left{flex:1;}
.partida-code{font-size:10px;color:var(--text2);font-family:monospace;}
.partida-name{font-size:12px;font-weight:600;margin-top:1px;}
.partida-time{font-size:10px;color:var(--text2);margin-top:2px;}
.partida-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px;}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px 20px;border:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px;}
.modal-close{float:right;cursor:pointer;color:var(--text2);font-size:24px;line-height:1;background:none;border:none;color:var(--text2);}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;resize:vertical;min-height:80px;font-family:inherit;outline:none;}
.section-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:16px;}
.empty{text-align:center;padding:48px 24px;color:var(--text2);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text);}
.dash-section{margin-bottom:24px;}
.dash-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.cuello-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;}
.cuello-count{font-size:18px;font-weight:800;color:var(--danger);min-width:32px;text-align:right;}
.timeline{padding-left:16px;border-left:2px solid var(--border);margin-top:8px;}
.timeline-item{position:relative;padding:0 0 14px 16px;}
.timeline-dot{position:absolute;left:-21px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--border);}
.timeline-dot.done{background:var(--success);}
.timeline-dot.pending{background:var(--warning);}
.timeline-dot.rejected{background:var(--danger);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
input[type=text],input[type=email],input[type=password]{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;outline:none;}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:12px;outline:none;}
@media(min-width:600px){.modal{border-radius:16px;margin:20px;}.modal-overlay{align-items:center;}}
</style>
</head>

var currentUser = null;
var userProfile = null;
var activeTab = "modulos";
var activeFilter = "todos";
var activeListeners = [];

function closeModal(){document.getElementById("modal").style.display="none";}
function showModal(html){document.getElementById("modal-body").innerHTML=html;document.getElementById("modal").style.display="flex";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});

function canActOn(estado,role){
  if(role==="admin"||role==="gerente")return true;
  if((estado==="pendiente"||estado==="observacion")&&role.startsWith("supervisor"))return true;
  if(estado==="ejecutado"&&role==="qc1")return true;
  if(estado==="qc1"&&role==="qc2")return true;
  if(estado==="qc2"&&role==="fto")return true;
  return false;
}

function nextEstado(nivel){
  var flow={ejecutado:"qc1",qc1:"qc2",qc2:"fto",fto:"aprobado"};
  return flow[nivel]||nivel;
}

function timeDiff(t1,t2){
  if(!t1||!t2)return null;
  var d1=t1.toDate?t1.toDate():new Date(t1);
  var d2=t2.toDate?t2.toDate():new Date(t2);
  var diff=Math.abs(d2-d1)/36e5;
  if(diff<1)return Math.round(diff*60)+" min";
  return diff.toFixed(1)+" hrs";
}

// AUTH
document.getElementById("btn-login").onclick=function(){
  var email=document.getElementById("auth-email").value.trim();
  var pass=document.getElementById("auth-pass").value;
  var err=document.getElementById("auth-err");
  var btn=document.getElementById("btn-login");
  err.textContent="";btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  auth.signInWithEmailAndPassword(email,pass).catch(function(){
    err.textContent="Correo o contraseña incorrectos.";
    btn.disabled=false;btn.textContent="Entrar";
  });
};
document.getElementById("btn-logout").onclick=function(){auth.signOut();};
document.getElementById("auth-pass").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("btn-login").click();});

auth.onAuthStateChanged(function(user){
  if(user){
    currentUser=user;
    db.collection("users").doc(user.uid).get().then(function(snap){
      userProfile=snap.exists?snap.data():{nombre:user.email,rol:"supervisor_obra_gruesa"};
      document.getElementById("auth-screen").style.display="none";
      document.getElementById("app").style.display="flex";
      document.getElementById("topbar-user").textContent=userProfile.nombre||user.email;
      var ri=ROLES[userProfile.rol]||{label:userProfile.rol,color:""};
      var tr=document.getElementById("topbar-role");
      tr.textContent=ri.label;tr.className="topbar-role "+ri.color;
      initApp();
    });
  }else{
    currentUser=null;userProfile=null;
    document.getElementById("auth-screen").style.display="flex";
    document.getElementById("app").style.display="none";
    activeListeners.forEach(function(u){if(u)u();});activeListeners=[];
  }
});

function initApp(){
  var role=userProfile.rol;
  var tabs=[];
  if(role.startsWith("supervisor"))tabs.push({id:"modulos",label:"Mis Módulos"});
  if(role==="qc1"||role==="qc2"||role==="fto")tabs.push({id:"revisar",label:"Por Revisar"});
  if(role==="gerente"||role==="admin"){tabs.push({id:"dashboard",label:"Dashboard"});tabs.push({id:"modulos",label:"Módulos"});}
  if(role==="admin")tabs.push({id:"admin",label:"Administrar"});
  tabs.push({id:"historial",label:"Historial"});
  var nav=document.getElementById("nav-tabs");
  nav.innerHTML=tabs.map(function(t){
    return '<div class="nav-tab'+(t.id===activeTab?" active":"")+'" data-tab="'+t.id+'">'+t.label+'</div>';
  }).join("");
  nav.querySelectorAll(".nav-tab").forEach(function(el){
    el.onclick=function(){
      activeTab=el.dataset.tab;
      nav.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active");});
      el.classList.add("active");
      renderTab();
    };
  });
  renderTab();
}

function renderTab(){
  var c=document.getElementById("main-content");
  c.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';
  if(activeTab==="modulos")renderModulos();
  else if(activeTab==="revisar")renderRevisar();
  else if(activeTab==="dashboard")renderDashboard();
  else if(activeTab==="admin")renderAdmin();
  else if(activeTab==="historial")renderHistorial();
}

function renderModulos(){
  activeListeners.forEach(function(u){if(u)u();});activeListeners=[];
  var unsub=db.collection("modulos").where("activo","==",true).onSnapshot(function(snap){
    var modulos=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    modulos.sort(function(a,b){return(a.orden||999)-(b.orden||999);});
    var c=document.getElementById("main-content");if(!c)return;
    var total=modulos.length;
    var completos=modulos.filter(function(m){
      var partidas=m.tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
      var estados=m.estados||{};
      return partidas.every(function(p){return estados[p.code]==="aprobado";});
    }).length;
    var html='<div class="stats-row">';
    html+='<div class="stat-box"><div class="stat-num">'+total+'</div><div class="stat-label">En Planta</div></div>';
    html+='<div class="stat-box"><div class="stat-num" style="color:var(--success)">'+completos+'</div><div class="stat-label">Completos</div></div>';
    html+='<div class="stat-box"><div class="stat-num" style="color:var(--warning)">'+(total-completos)+'</div><div class="stat-label">En Progreso</div></div>';
    html+='</div>';
    html+='<div class="filters">';
    html+='<button class="filter-btn'+(activeFilter==="todos"?" active":"")+'" onclick="setFilter(\'todos\')">Todos</button>';
    html+='<button class="filter-btn'+(activeFilter==="seco"?" active":"")+'" onclick="setFilter(\'seco\')">M1 Secos</button>';
    html+='<button class="filter-btn'+(activeFilter==="humedo"?" active":"")+'" onclick="setFilter(\'humedo\')">M2 Húmedos</button>';
    html+='<button class="filter-btn'+(activeFilter==="pendiente"?" active":"")+'" onclick="setFilter(\'pendiente\')">Con Pendientes</button>';
    html+='</div>';
    var filtered=modulos.filter(function(m){
      if(activeFilter==="seco")return m.tipo==="seco";
      if(activeFilter==="humedo")return m.tipo==="humedo";
      if(activeFilter==="pendiente"){
        var partidas=m.tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
        var estados=m.estados||{};
        return!partidas.every(function(p){return estados[p.code]==="aprobado";});
      }
      return true;
    });
    if(filtered.length===0){
      html+='<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Sin módulos</div></div>';
    }else{
      filtered.forEach(function(m){
        var partidas=m.tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
        var estados=m.estados||{};
        var ap=partidas.filter(function(p){return estados[p.code]==="aprobado";}).length;
        var pct=Math.round(ap/partidas.length*100);
        var enObs=partidas.some(function(p){return estados[p.code]==="observacion";});
        var enRev=partidas.some(function(p){return["ejecutado","qc1","qc2","fto"].indexOf(estados[p.code])>=0;});
        html+='<div class="module-item" onclick="openModulo(\''+m.id+'\')">';
        html+='<div class="module-row"><div>';
        html+='<div class="module-name">'+m.nombre+'</div>';
        html+='<div class="module-meta"><span class="badge badge-'+m.tipo+'">'+(m.tipo==="seco"?"M1 Seco":"M2 Húmedo")+'</span>';
        if(enObs)html+=' <span class="badge badge-observacion">Obs.</span>';
        if(enRev)html+=' <span class="badge badge-ejecutado">En Revisión</span>';
        html+='</div></div>';
        html+='<div style="text-align:right"><div style="font-size:16px;font-weight:800;color:'+(pct===100?'var(--success)':'var(--accent)')+'">'+pct+'%</div>';
        html+='<div style="font-size:10px;color:var(--text2)">'+ap+'/'+partidas.length+'</div></div></div>';
        html+='<div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%;background:'+(pct===100?'var(--success)':'var(--accent)')+'"></div></div>';
        html+='</div>';
      });
    }
    c.innerHTML=html;
  });
  activeListeners.push(unsub);
}

function setFilter(f){activeFilter=f;renderModulos();}

function openModulo(moduloId){
  db.collection("modulos").doc(moduloId).get().then(function(snap){
    if(!snap.exists)return;
    var m=Object.assign({id:snap.id},snap.data());
    var partidas=m.tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
    var estados=m.estados||{};
    var role=userProfile.rol;
    var grupoMap={supervisor_corte:"corte",supervisor_obra_gruesa:"obra_gruesa",supervisor_terminaciones:"terminaciones",supervisor_recepcion:"recepcion"};
    var miGrupo=grupoMap[role];
    var html='<button class="modal-close" onclick="closeModal()">×</button>';
    html+='<div class="modal-title">'+m.nombre+'</div>';
    html+='<div class="modal-sub"><span class="badge badge-'+m.tipo+'">'+(m.tipo==="seco"?"M1 Seco":"M2 Húmedo")+'</span> '+( m.edificio||"")+'</div>';
    var grupos=[];
    partidas.forEach(function(p){if(!p.sub&&grupos.indexOf(p.grupo)<0)grupos.push(p.grupo);});
    grupos.forEach(function(grupo){
      var gp=partidas.filter(function(p){return p.grupo===grupo&&!p.sub;});
      html+='<div class="section-label">'+grupo.replace("_"," ").toUpperCase()+'</div>';
      gp.forEach(function(p){
        var estado=estados[p.code]||"pendiente";
        var puedo=role==="admin"||role==="gerente"||(canActOn(estado,role)&&(role.startsWith("supervisor")?miGrupo===p.grupo:true));
        var tiempos=(m.tiempos&&m.tiempos[p.code])||{};
        var acciones="";
        if(puedo&&estado!=="aprobado"){
          if(estado==="pendiente"||estado==="observacion"){
            acciones='<button class="btn-sm btn-submit" onclick="marcarEjecutado(\''+moduloId+'\',\''+p.code+'\')">Marcar Listo</button>';
          }else if(estado==="ejecutado"){
            acciones='<button class="btn-sm btn-approve" onclick="aprobar(\''+moduloId+'\',\''+p.code+'\',\'qc1\')">Aprobar QC1</button> <button class="btn-sm btn-reject" onclick="rechazar(\''+moduloId+'\',\''+p.code+'\')">Obs.</button>';
          }else if(estado==="qc1"){
            acciones='<button class="btn-sm btn-approve" onclick="aprobar(\''+moduloId+'\',\''+p.code+'\',\'qc2\')">Aprobar QC2</button> <button class="btn-sm btn-reject" onclick="rechazar(\''+moduloId+'\',\''+p.code+'\')">Obs.</button>';
          }else if(estado==="qc2"){
            acciones='<button class="btn-sm btn-approve" onclick="aprobar(\''+moduloId+'\',\''+p.code+'\',\'fto\')">Aprobar FTO</button> <button class="btn-sm btn-reject" onclick="rechazar(\''+moduloId+'\',\''+p.code+'\')">Obs.</button>';
          }else if(estado==="fto"){
            acciones='<button class="btn-sm btn-approve" onclick="aprobar(\''+moduloId+'\',\''+p.code+'\',\'fto\')">Aprobar Final</button> <button class="btn-sm btn-reject" onclick="rechazar(\''+moduloId+'\',\''+p.code+'\')">Obs.</button>';
          }
        }
        var tiempoStr="";
        if(tiempos.ejecutado_at&&tiempos.aprobado_at)tiempoStr="Total: "+timeDiff(tiempos.ejecutado_at,tiempos.aprobado_at);
        html+='<div class="partida-item"><div class="partida-left">';
        html+='<div class="partida-code">'+p.code+'</div>';
        html+='<div class="partida-name">'+p.name+'</div>';
        if(tiempoStr)html+='<div class="partida-time">⏱ '+tiempoStr+'</div>';
        html+='</div><div class="partida-actions"><span class="badge badge-'+estado+'">'+ESTADO_LABELS[estado]+'</span>'+acciones+'</div></div>';
      });
    });
    html+='<div style="height:20px"></div>';
    showModal(html);
  });
}

function actualizarModulo(moduloId, code, nuevoEstado, extra, accion, obsText){
  db.collection("modulos").doc(moduloId).get().then(function(snap){
    if(!snap.exists)return;
    var data=snap.data();
    var estados=data.estados||{};
    var tiempos=data.tiempos||{};
    var observaciones=data.observaciones||{};
    var now=new Date().toISOString();
    var usuario=userProfile.nombre||currentUser.email;

    estados[code]=nuevoEstado;
    if(!tiempos[code])tiempos[code]={};

    if(accion==="ejecutado"){
      tiempos[code].ejecutado_at=now;
      tiempos[code].ejecutado_por=usuario;
    }else if(accion.startsWith("aprobado_")){
      var nivel=accion.replace("aprobado_","");
      tiempos[code][nivel+"_at"]=now;
      tiempos[code][nivel+"_por"]=usuario;
      if(nuevoEstado==="aprobado")tiempos[code].aprobado_at=now;
    }else if(accion==="observacion"){
      observaciones[code]=obsText||"";
      tiempos[code].obs_at=now;
    }

    db.collection("modulos").doc(moduloId).update({
      estados:estados, tiempos:tiempos, observaciones:observaciones
    }).then(function(){
      db.collection("historial").add({
        moduloId:moduloId, partida:code, accion:accion,
        observacion:obsText||"", usuario:usuario, rol:userProfile.rol,
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
      });
      closeModal();
      setTimeout(function(){openModulo(moduloId);},400);
    }).catch(function(e){console.log("Error guardando:",e.message);});
  });
}

function marcarEjecutado(moduloId,code){
  actualizarModulo(moduloId,code,"ejecutado",null,"ejecutado","");
}

function aprobar(moduloId,code,nivel){
  var siguiente=nextEstado(nivel);
  actualizarModulo(moduloId,code,siguiente,null,"aprobado_"+nivel,"");
}

function rechazar(moduloId,code){
  showModal('<button class="modal-close" onclick="closeModal()">×</button><div class="modal-title">Registrar Observación</div><div class="modal-sub">'+code+'</div><textarea id="obs-text" placeholder="Describe el problema..."></textarea><div style="margin-top:12px"><button class="btn" onclick="confirmarRechazo(\''+moduloId+'\',\''+code+'\')">Registrar</button></div>');
}

function confirmarRechazo(moduloId,code){
  var obs=document.getElementById("obs-text").value.trim();
  if(!obs){alert("Escribe la observación");return;}
  actualizarModulo(moduloId,code,"observacion",null,"observacion",obs);
}

function renderRevisar(){
  activeListeners.forEach(function(u){if(u)u();});activeListeners=[];
  var role=userProfile.rol;
  var estadoMap={qc1:"ejecutado",qc2:"qc1",fto:"qc2"};
  var miEstado=estadoMap[role];
  var unsub=db.collection("modulos").where("activo","==",true).onSnapshot(function(snap){
    var c=document.getElementById("main-content");if(!c)return;
    var pendientes=[];
    snap.docs.forEach(function(d){
      var m=Object.assign({id:d.id},d.data());
      var partidas=m.tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
      var estados=m.estados||{};
      partidas.forEach(function(p){
        if(estados[p.code]===miEstado)pendientes.push({modulo:m,partida:p,tiempos:(m.tiempos&&m.tiempos[p.code])||{}});
      });
    });
    if(pendientes.length===0){
      c.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Sin pendientes</div><div class="empty-sub">No hay partidas esperando tu revisión</div></div>';
      return;
    }
    var html='<div class="stats-row"><div class="stat-box"><div class="stat-num" style="color:var(--warning)">'+pendientes.length+'</div><div class="stat-label">Por Revisar</div></div></div>';
    pendientes.forEach(function(item){
      var m=item.modulo,p=item.partida,tiempos=item.tiempos;
      html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
      html+='<div><div style="font-size:13px;font-weight:700">'+m.nombre+'</div>';
      html+='<div style="margin-top:3px"><span class="badge badge-'+m.tipo+'">'+(m.tipo==="seco"?"M1 Seco":"M2 Húmedo")+'</span></div></div>';
      html+='<span class="badge badge-ejecutado">Esperando '+role.toUpperCase()+'</span></div>';
      html+='<div class="partida-item"><div class="partida-left">';
      html+='<div class="partida-code">'+p.code+'</div><div class="partida-name">'+p.name+'</div>';
      html+='</div><div class="partida-actions">';
      html+='<button class="btn-sm btn-approve" onclick="aprobar(\''+m.id+'\',\''+p.code+'\',\''+role+'\')">Aprobar</button>';
      html+='<button class="btn-sm btn-reject" onclick="rechazar(\''+m.id+'\',\''+p.code+'\')">Obs.</button>';
      html+='</div></div></div>';
    });
    c.innerHTML=html;
  });
  activeListeners.push(unsub);
}

function renderDashboard(){
  activeListeners.forEach(function(u){if(u)u();});activeListeners=[];
  var unsub=db.collection("modulos").where("activo","==",true).onSnapshot(function(snap){
    var c=document.getElementById("main-content");if(!c)return;
    var modulos=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var totalP=0,ap=0,enRev=0,obs=0,cuellos={};
    modulos.forEach(function(m){
      var partidas=m.tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
      var estados=m.estados||{};
      partidas.forEach(function(p){
        totalP++;
        var est=estados[p.code]||"pendiente";
        if(est==="aprobado")ap++;
        else if(["ejecutado","qc1","qc2","fto"].indexOf(est)>=0){enRev++;if(!cuellos[p.code])cuellos[p.code]={name:p.name,count:0};cuellos[p.code].count++;}
        else if(est==="observacion")obs++;
      });
    });
    var pct=totalP>0?Math.round(ap/totalP*100):0;
    var topC=Object.values(cuellos).sort(function(a,b){return b.count-a.count;}).slice(0,6);
    var html='<div class="dash-section"><div class="dash-title">Avance General</div>';
    html+='<div class="stats-row">';
    html+='<div class="stat-box"><div class="stat-num">'+pct+'%</div><div class="stat-label">Avance</div></div>';
    html+='<div class="stat-box"><div class="stat-num" style="color:var(--success)">'+ap+'</div><div class="stat-label">Aprobadas</div></div>';
    html+='<div class="stat-box"><div class="stat-num" style="color:var(--warning)">'+enRev+'</div><div class="stat-label">En Revisión</div></div>';
    html+='<div class="stat-box"><div class="stat-num" style="color:var(--danger)">'+obs+'</div><div class="stat-label">Observaciones</div></div>';
    html+='</div><div class="progress-wrap" style="height:10px"><div class="progress-bar" style="width:'+pct+'%"></div></div></div>';
    html+='<div class="dash-section"><div class="dash-title">Cuellos de Botella</div>';
    if(topC.length===0)html+='<div style="color:var(--text2);font-size:13px">Sin cuellos activos</div>';
    else topC.forEach(function(item){html+='<div class="cuello-item"><div style="flex:1"><div style="font-size:12px;font-weight:600">'+item.name+'</div></div><div class="cuello-count">'+item.count+'</div></div>';});
    html+='</div>';
    c.innerHTML=html;
  });
  activeListeners.push(unsub);
}

function renderHistorial(){
  db.collection("historial").orderBy("timestamp","desc").limit(80).get().then(function(snap){
    var c=document.getElementById("main-content");
    var items=snap.docs.map(function(d){return d.data();});
    if(items.length===0){c.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin historial</div></div>';return;}
    var map={ejecutado:"Marcó ejecutado",aprobado_qc1:"Aprobó QC1",aprobado_qc2:"Aprobó QC2",aprobado_fto:"Aprobó FTO",observacion:"Registró observación"};
    var html='<div class="timeline">';
    items.forEach(function(item){
      var color=item.accion==="observacion"?"rejected":item.accion.startsWith("aprobado")?"done":"pending";
      html+='<div class="timeline-item"><div class="timeline-dot '+color+'"></div>';
      html+='<div style="font-size:11px;font-weight:700;color:var(--text2)">'+(item.usuario||"")+'</div>';
      html+='<div style="font-size:12px;margin-top:2px">'+(map[item.accion]||item.accion)+' — <span style="font-family:monospace;font-size:11px">'+item.partida+'</span></div>';
      if(item.observacion)html+='<div style="font-size:11px;color:var(--danger);margin-top:2px">⚠ '+item.observacion+'</div>';
      html+='<div style="font-size:10px;color:var(--text2);margin-top:2px">'+item.moduloId+'</div></div>';
    });
    html+='</div>';
    c.innerHTML=html;
  });
}

  var c=document.getElementById("main-content");
  c.innerHTML='<div class="card"><div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Agregar Módulo</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:10px"><input type="text" id="mod-nombre" placeholder="Ej: E01-P1-D1" style="flex:1"><select id="mod-tipo"><option value="seco">M1 Seco</option><option value="humedo">M2 Húmedo</option></select></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px"><input type="text" id="mod-edificio" placeholder="Edificio (E01)" style="flex:1"><input type="text" id="mod-depto" placeholder="Depto (P1-D1)" style="flex:1"></div>'
    +'<button class="btn" onclick="addModulo()">Agregar</button></div>'
    +'<div class="card" style="margin-top:12px"><div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Crear Usuario</div>'
    +'<div style="margin-bottom:10px"><input type="text" id="u-nombre" placeholder="Nombre completo" style="width:100%"></div>'

    +'</select></div>'

    +'<div class="err" id="u-err"></div></div>';
}

function addModulo(){
  var nombre=document.getElementById("mod-nombre").value.trim();
  var tipo=document.getElementById("mod-tipo").value;
  var edificio=document.getElementById("mod-edificio").value.trim();
  var depto=document.getElementById("mod-depto").value.trim();
  if(!nombre){alert("Escribe el nombre");return;}
  var partidas=tipo==="seco"?PARTIDAS_SECO:PARTIDAS_HUMEDO;
  var estados={};partidas.forEach(function(p){estados[p.code]="pendiente";});
  db.collection("modulos").add({nombre:nombre,tipo:tipo,edificio:edificio,depto:depto,activo:true,estados:estados,tiempos:{},observaciones:{},creado_at:firebase.firestore.FieldValue.serverTimestamp(),orden:Date.now()}).then(function(){
    alert("Módulo "+nombre+" agregado");
    document.getElementById("mod-nombre").value="";
  });
}

function addUser(){
  var nombre=document.getElementById("u-nombre").value.trim();
  var email=document.getElementById("u-email").value.trim();
  var pass=document.getElementById("u-pass").value;
  var rol=document.getElementById("u-rol").value;
  var err=document.getElementById("u-err");
  err.textContent="";
  if(!nombre||!email||!pass){err.textContent="Completa todos los campos";return;}
  auth.createUserWithEmailAndPassword(email,pass).then(function(cred){
    return db.collection("users").doc(cred.user.uid).set({nombre:nombre,email:email,rol:rol});
  }).then(function(){
    err.style.color="var(--success)";err.textContent="Usuario creado";
    document.getElementById("u-nombre").value="";document.getElementById("u-email").value="";document.getElementById("u-pass").value="";
  }).catch(function(e){err.textContent=e.message;});
}
