<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>La Chacra — Control de Planta</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3349;
    --accent: #f0a500;
    --accent2: #3b82f6;
    --danger: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --seco: #3b82f6;
    --humedo: #8b5cf6;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; font-size: 14px; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 32px; width: 100%; max-width: 380px;
  }
  .auth-logo { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { color: var(--text2); font-size: 13px; margin-bottom: 32px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
  .field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 11px 14px; font-size: 14px; outline: none; transition: border 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; background: var(--accent); color: #000; border: none; border-radius: var(--radius);
    padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.3px;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sec {
    background: transparent; color: var(--text2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn-sec:hover { border-color: var(--text2); color: var(--text); }
  .btn-sm {
    padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: 6px;
    border: none; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-sm:hover { opacity: 0.85; }
  .btn-approve { background: var(--success); color: #000; }
  .btn-reject { background: var(--danger); color: #fff; }
  .btn-submit { background: var(--accent); color: #000; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .err { color: var(--danger); font-size: 12px; margin-top: 10px; text-align: center; }

  /* LAYOUT */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-weight: 700; }
  .topbar-user { font-size: 12px; color: var(--text2); }
  .topbar-role {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px; background: var(--surface2);
  }
  .role-supervisor { color: var(--accent); }
  .role-qc1 { color: var(--accent2); }
  .role-qc2 { color: var(--humedo); }
  .role-fto { color: var(--success); }
  .role-gerente { color: var(--warning); }
  .role-admin { color: var(--danger); }

  /* NAV TABS */
  .nav-tabs {
    display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 12px 18px; font-size: 12px; font-weight: 600; color: var(--text2);
    cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
    letter-spacing: 0.4px; transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN CONTENT */
  .main { flex: 1; padding: 16px; max-width: 900px; margin: 0 auto; width: 100%; }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 700; }
  .card-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* BADGES */
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
  }
  .badge-seco { background: rgba(59,130,246,0.18); color: var(--seco); }
  .badge-humedo { background: rgba(139,92,246,0.18); color: var(--humedo); }
  .badge-pendiente { background: rgba(139,144,167,0.15); color: var(--text2); }
  .badge-ejecutado { background: rgba(245,158,11,0.18); color: var(--warning); }
  .badge-qc1 { background: rgba(59,130,246,0.18); color: var(--accent2); }
  .badge-qc2 { background: rgba(139,92,246,0.18); color: var(--humedo); }
  .badge-fto { background: rgba(34,197,94,0.12); color: var(--success); }
  .badge-aprobado { background: rgba(34,197,94,0.18); color: var(--success); }
  .badge-observacion { background: rgba(239,68,68,0.18); color: var(--danger); }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-box {
    background: var(--surface2); border-radius: var(--radius); padding: 14px 12px; text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* PROGRESS BAR */
  .progress-wrap { background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 8px; }
  .progress-bar { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s; }

  /* MODULE LIST */
  .module-item {
    background: var(--surface2); border-radius: var(--radius); padding: 14px;
    margin-bottom: 8px; cursor: pointer; transition: border 0.2s; border: 1px solid transparent;
  }
  .module-item:hover { border-color: var(--border); }
  .module-item.selected { border-color: var(--accent); }
  .module-row { display: flex; align-items: center; justify-content: space-between; }
  .module-name { font-size: 13px; font-weight: 700; }
  .module-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* PARTIDAS */
  .partida-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .partida-left { flex: 1; }
  .partida-code { font-size: 10px; color: var(--text2); font-family: monospace; }
  .partida-name { font-size: 12px; font-weight: 600; margin-top: 1px; }
  .partida-time { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .partida-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; margin-left: 8px; }

  /* FILTERS */
  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .filter-btn:hover { border-color: var(--text2); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: var(--surface); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px;
    max-height: 85vh; overflow-y: auto; padding: 24px 20px;
    border: 1px solid var(--border); border-bottom: none;
  }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
  .modal-close { float: right; cursor: pointer; color: var(--text2); font-size: 20px; line-height: 1; }
  textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 10px 12px; font-size: 13px; resize: vertical; min-height: 80px;
    font-family: var(--font); outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  /* TIMELINE */
  .timeline { padding-left: 16px; border-left: 2px solid var(--border); margin-top: 12px; }
  .timeline-item { position: relative; padding: 0 0 14px 16px; }
  .timeline-dot {
    position: absolute; left: -21px; top: 3px; width: 10px; height: 10px;
    border-radius: 50%; background: var(--border);
  }
  .timeline-dot.done { background: var(--success); }
  .timeline-dot.pending { background: var(--warning); }
  .timeline-dot.rejected { background: var(--danger); }
  .timeline-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .timeline-text { font-size: 12px; margin-top: 2px; }
  .timeline-time { font-size: 10px; color: var(--text2); margin-top: 2px; }

  /* DASHBOARD */
  .dash-section { margin-bottom: 24px; }
  .dash-section-title {
    font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .cuello-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--surface2); border-radius: 8px; margin-bottom: 6px;
  }
  .cuello-bar { flex: 1; }
  .cuello-label { font-size: 12px; font-weight: 600; }
  .cuello-hrs { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .cuello-count { font-size: 18px; font-weight: 800; color: var(--danger); min-width: 32px; text-align: right; }

  /* ADMIN */
  .admin-section { margin-bottom: 20px; }
  .admin-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .user-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--surface2); border-radius: 8px; margin-bottom: 6px;
  }
  .user-info { font-size: 13px; font-weight: 600; }
  .user-email { font-size: 11px; color: var(--text2); }
  select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none;
  }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .empty-sub { font-size: 12px; }

  /* NOTIFICATION DOT */
  .notif-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--danger); margin-left: 5px; vertical-align: middle;
  }

  /* RESPONSIVE */
  @media (min-width: 600px) {
    .modal { border-radius: 16px; margin: 20px; max-height: 80vh; }
    .modal-overlay { align-items: center; }
  }

  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .separator { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input { flex: 1; }
</style>

// ─── HELPERS ────────────────────────────────────────────────────────────────
function ts(timestamp) {
  if (!timestamp) return "—";
  const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return d.toLocaleDateString("es-CL", { day:"2-digit", month:"2-digit" }) +
    " " + d.toHours().toString().padStart(2,"0") + ":" +
    d.getMinutes().toString().padStart(2,"0");
}
Date.prototype.toHours = function() { return this.getHours(); };

function timeDiff(t1, t2) {
  if (!t1 || !t2) return null;
  const d1 = t1.toDate ? t1.toDate() : new Date(t1);
  const d2 = t2.toDate ? t2.toDate() : new Date(t2);
  const diff = Math.abs(d2 - d1) / 36e5;
  if (diff < 1) return Math.round(diff * 60) + " min";
  return diff.toFixed(1) + " hrs";
}

function showModal(html) {
  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal").style.display = "flex";
}
function closeModal() {
  document.getElementById("modal").style.display = "none";
}
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

function canActOn(estado, role) {
  if (role === "admin") return true;
  if (estado === "pendiente" && role.startsWith("supervisor")) return true;
  if (estado === "ejecutado" && role === "qc1") return true;
  if (estado === "qc1" && role === "qc2") return true;
  if (estado === "qc2" && role === "fto") return true;
  if (estado === "observacion" && role.startsWith("supervisor")) return true;
  return false;
}

function nextEstado(current) {
  const flow = { pendiente:"ejecutado", ejecutado:"qc1", qc1:"qc2", qc2:"fto", fto:"aprobado" };
  return flow[current] || current;
}

// ─── INIT APP ────────────────────────────────────────────────────────────────
function initApp() {
  const role = userProfile.rol;
  let tabs = [];
  if (role.startsWith("supervisor")) tabs.push({ id:"modulos", label:"Mis Módulos" });
  if (role === "qc1" || role === "qc2" || role === "fto") tabs.push({ id:"revisar", label:"Por Revisar" });
  if (role === "gerente" || role === "admin") tabs.push({ id:"dashboard", label:"Dashboard" });
  if (role === "gerente" || role === "admin") tabs.push({ id:"modulos", label:"Todos los Módulos" });
  if (role === "admin") tabs.push({ id:"admin", label:"Administrar" });
  tabs.push({ id:"historial", label:"Historial" });

  const nav = document.getElementById("nav-tabs");
  nav.innerHTML = tabs.map(t =>
    `<div class="nav-tab${t.id===activeTab?" active":""}" data-tab="${t.id}">${t.label}</div>`
  ).join("");
  nav.querySelectorAll(".nav-tab").forEach(el => {
    el.onclick = () => {
      activeTab = el.dataset.tab;
      nav.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      renderTab();
    };
  });
  renderTab();
}

function renderTab() {
  const c = document.getElementById("main-content");
  c.innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';
  if (activeTab === "modulos") renderModulos();
  else if (activeTab === "revisar") renderRevisar();
  else if (activeTab === "dashboard") renderDashboard();
  else if (activeTab === "admin") renderAdmin();
  else if (activeTab === "historial") renderHistorial();
}

// ─── MÓDULOS VIEW ─────────────────────────────────────────────────────────────
function renderModulos() {
  const role = userProfile.rol;
  const grupoMap = {
    supervisor_corte: "corte",
    supervisor_obra_gruesa: "obra_gruesa",
    supervisor_terminaciones: "terminaciones",
    supervisor_recepcion: "recepcion",
  };
  const miGrupo = grupoMap[role] || null;

  let q;
  if (miGrupo && role !== "gerente" && role !== "admin") {
    q = query(collection(db, "modulos"), where("activo", "==", true));
  } else {
    q = query(collection(db, "modulos"), where("activo", "==", true));
  }

  listeners.forEach(u => u && u());
  listeners = [];

  const unsub = onSnapshot(q, snap => {
    let modulos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    modulos.sort((a,b) => (a.orden||999) - (b.orden||999));

    const c = document.getElementById("main-content");
    if (!c) return;

    const total = modulos.length;
    const aprobados = modulos.filter(m => {
      const partidas = m.tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
      const estados = m.estados || {};
      return partidas.every(p => estados[p.code] === "aprobado");
    }).length;

    let html = `
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">En Planta</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--success)">${aprobados}</div><div class="stat-label">Completos</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--warning)">${total-aprobados}</div><div class="stat-label">En Progreso</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn ${activeFilter==='todos'?'active':''}" onclick="window._setFilter('todos')">Todos</button>
        <button class="filter-btn ${activeFilter==='seco'?'active':''}" onclick="window._setFilter('seco')">M1 Secos</button>
        <button class="filter-btn ${activeFilter==='humedo'?'active':''}" onclick="window._setFilter('humedo')">M2 Húmedos</button>
        <button class="filter-btn ${activeFilter==='pendiente'?'active':''}" onclick="window._setFilter('pendiente')">Con Pendientes</button>
      </div>`;

    let filtered = modulos;
    if (activeFilter === "seco") filtered = modulos.filter(m => m.tipo === "seco");
    else if (activeFilter === "humedo") filtered = modulos.filter(m => m.tipo === "humedo");
    else if (activeFilter === "pendiente") filtered = modulos.filter(m => {
      const partidas = m.tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
      const estados = m.estados || {};
      return !partidas.every(p => estados[p.code] === "aprobado");
    });

    if (filtered.length === 0) {
      html += `<div class="empty"><div class="empty-icon">📦</div>
        <div class="empty-text">Sin módulos activos</div>
        <div class="empty-sub">Agrega módulos desde Administrar</div></div>`;
    } else {
      filtered.forEach(m => {
        const partidas = m.tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
        const estados = m.estados || {};
        const total_p = partidas.length;
        const aprobados_p = partidas.filter(p => estados[p.code] === "aprobado").length;
        const pct = Math.round(aprobados_p / total_p * 100);
        const enObs = partidas.some(p => estados[p.code] === "observacion");
        const tieneRev = partidas.some(p => ["ejecutado","qc1","qc2"].includes(estados[p.code]));

        html += `<div class="module-item" onclick="window._openModulo('${m.id}')">
          <div class="module-row">
            <div>
              <div class="module-name">${m.nombre}</div>
              <div class="module-meta">
                <span class="badge badge-${m.tipo}">${m.tipo === "seco" ? "M1 Seco" : "M2 Húmedo"}</span>
                ${enObs ? ' <span class="badge badge-observacion">Obs.</span>' : ''}
                ${tieneRev ? ' <span class="badge badge-ejecutado">En Revisión</span>' : ''}
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:800;color:${pct===100?'var(--success)':'var(--accent)'}">${pct}%</div>
              <div style="font-size:10px;color:var(--text2)">${aprobados_p}/${total_p}</div>
            </div>
          </div>
          <div class="progress-wrap" style="margin-top:10px">
            <div class="progress-bar" style="width:${pct}%;background:${pct===100?'var(--success)':'var(--accent)'}"></div>
          </div>
        </div>`;
      });
    }

    c.innerHTML = html;
  });
  listeners.push(unsub);
}

window._setFilter = (f) => { activeFilter = f; renderModulos(); };

window._openModulo = async (moduloId) => {
  const snap = await getDoc(doc(db, "modulos", moduloId));
  if (!snap.exists()) return;
  const m = { id: snap.id, ...snap.data() };
  const partidas = m.tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
  const estados = m.estados || {};
  const role = userProfile.rol;

  const grupoMap = {
    supervisor_corte: "corte",
    supervisor_obra_gruesa: "obra_gruesa",
    supervisor_terminaciones: "terminaciones",
    supervisor_recepcion: "recepcion",
  };
  const miGrupo = grupoMap[role];

  let html = `<span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-title">${m.nombre}</div>
    <div class="modal-sub">
      <span class="badge badge-${m.tipo}">${m.tipo==="seco"?"M1 Seco":"M2 Húmedo"}</span>
      &nbsp;${m.edificio || ""} · ${m.depto || ""}
    </div>`;

  const grupos = [...new Set(partidas.map(p => p.grupo))];
  grupos.forEach(grupo => {
    const gPartidas = partidas.filter(p => p.grupo === grupo && !p.sub);
    html += `<div class="section-label" style="margin-top:16px">${grupo.replace("_"," ").toUpperCase()}</div>`;
    gPartidas.forEach(p => {
      const estado = estados[p.code] || "pendiente";
      const puedo = role === "admin" || role === "gerente" || (canActOn(estado, role) && (role.startsWith("supervisor") ? miGrupo === p.grupo : true));
      const tiempos = m.tiempos?.[p.code] || {};

      let acciones = "";
      if (puedo && estado !== "aprobado") {
        if (role.startsWith("supervisor") && (estado === "pendiente" || estado === "observacion")) {
          acciones = `<button class="btn-sm btn-submit" onclick="window._marcarEjecutado('${moduloId}','${p.code}')">Marcar Listo</button>`;
        } else if (role === "qc1" && estado === "ejecutado") {
          acciones = `<button class="btn-sm btn-approve" onclick="window._aprobar('${moduloId}','${p.code}','qc1')">Aprobar</button>
            <button class="btn-sm btn-reject" onclick="window._rechazar('${moduloId}','${p.code}')">Obs.</button>`;
        } else if (role === "qc2" && estado === "qc1") {
          acciones = `<button class="btn-sm btn-approve" onclick="window._aprobar('${moduloId}','${p.code}','qc2')">Aprobar</button>
            <button class="btn-sm btn-reject" onclick="window._rechazar('${moduloId}','${p.code}')">Obs.</button>`;
        } else if (role === "fto" && estado === "qc2") {
          acciones = `<button class="btn-sm btn-approve" onclick="window._aprobar('${moduloId}','${p.code}','fto')">Aprobar</button>
            <button class="btn-sm btn-reject" onclick="window._rechazar('${moduloId}','${p.code}')">Obs.</button>`;
        }
      }

      let tiempoStr = "";
      if (tiempos.ejecutado_at && tiempos.aprobado_at) {
        tiempoStr = `Total: ${timeDiff(tiempos.ejecutado_at, tiempos.aprobado_at)}`;
      } else if (tiempos.ejecutado_at) {
        tiempoStr = `Desde ejecución: en curso`;
      }

      html += `<div class="partida-item">
        <div class="partida-left">
          <div class="partida-code">${p.code}</div>
          <div class="partida-name">${p.name}</div>
          ${tiempoStr ? `<div class="partida-time">⏱ ${tiempoStr}</div>` : ""}
        </div>
        <div class="partida-actions">
          <span class="badge badge-${estado}">${ESTADO_LABELS[estado]}</span>
          ${acciones}
        </div>
      </div>`;
    });
  });

  html += `<div style="height:20px"></div>`;
  showModal(html);
};

window._marcarEjecutado = async (moduloId, code) => {
  await updateDoc(doc(db, "modulos", moduloId), {
    [`estados.${code}`]: "ejecutado",
    [`tiempos.${code}.ejecutado_at`]: serverTimestamp(),
    [`tiempos.${code}.ejecutado_por`]: userProfile.nombre || currentUser.email,
  });
  await addDoc(collection(db, "historial"), {
    moduloId, partida: code, accion: "ejecutado",
    usuario: userProfile.nombre || currentUser.email,
    rol: userProfile.rol, timestamp: serverTimestamp(),
  });
  closeModal();
  setTimeout(() => window._openModulo(moduloId), 300);
};

window._aprobar = async (moduloId, code, nivel) => {
  const siguiente = nextEstado(nivel);
  await updateDoc(doc(db, "modulos", moduloId), {
    [`estados.${code}`]: siguiente,
    [`tiempos.${code}.${nivel}_at`]: serverTimestamp(),
    [`tiempos.${code}.${nivel}_por`]: userProfile.nombre || currentUser.email,
    ...(siguiente === "aprobado" ? { [`tiempos.${code}.aprobado_at`]: serverTimestamp() } : {})
  });
  await addDoc(collection(db, "historial"), {
    moduloId, partida: code, accion: `aprobado_${nivel}`,
    usuario: userProfile.nombre || currentUser.email,
    rol: userProfile.rol, timestamp: serverTimestamp(),
  });
  closeModal();
  setTimeout(() => window._openModulo(moduloId), 300);
};

window._rechazar = (moduloId, code) => {
  showModal(`
    <span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-title">Registrar Observación</div>
    <div class="modal-sub">Partida ${code}</div>
    <textarea id="obs-text" placeholder="Describe el problema encontrado..."></textarea>
    <div style="margin-top:12px">
      <button class="btn" onclick="window._confirmarRechazo('${moduloId}','${code}')">Registrar Observación</button>
    </div>
  `);
};

window._confirmarRechazo = async (moduloId, code) => {
  const obs = document.getElementById("obs-text").value.trim();
  if (!obs) { alert("Escribe la observación"); return; }
  await updateDoc(doc(db, "modulos", moduloId), {
    [`estados.${code}`]: "observacion",
    [`observaciones.${code}`]: obs,
    [`tiempos.${code}.obs_at`]: serverTimestamp(),
  });
  await addDoc(collection(db, "historial"), {
    moduloId, partida: code, accion: "observacion", observacion: obs,
    usuario: userProfile.nombre || currentUser.email,
    rol: userProfile.rol, timestamp: serverTimestamp(),
  });
  closeModal();
};

  const q = query(collection(db, "modulos"), where("activo", "==", true));

    let pendientes = [];

      const estados = m.estados || {};
      partidas.forEach(p => {

        <div class="stat-num" style="color:var(--warning)">${pendientes.length}</div>
        <div class="stat-label">Por Revisar</div>
      </div>
    </div>`;

    pendientes.forEach(({ modulo, partida, tiempos }) => {
      const espera = tiempos.ejecutado_at ? timeDiff(tiempos.ejecutado_at, { toDate: () => new Date() }) : "—";

            <div class="partida-code">${partida.code}</div>

    c.innerHTML = html;

function renderDashboard() {
  const q = query(collection(db, "modulos"), where("activo", "==", true));
  const unsub = onSnapshot(q, snap => {
    const c = document.getElementById("main-content");
    if (!c) return;

    const modulos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    let totalPartidas = 0, aprobadas = 0, enRevision = 0, observaciones = 0;
    let cuellos = {};

    modulos.forEach(m => {
      const partidas = m.tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
      const estados = m.estados || {};
      partidas.forEach(p => {
        totalPartidas++;
        const est = estados[p.code] || "pendiente";
        if (est === "aprobado") aprobadas++;
        else if (["ejecutado","qc1","qc2","fto"].includes(est)) enRevision++;
        else if (est === "observacion") observaciones++;
        if (["ejecutado","qc1","qc2","fto"].includes(est)) {
          if (!cuellos[p.code]) cuellos[p.code] = { name: p.name, count: 0 };
          cuellos[p.code].count++;
        }
      });
    });

    const pct = totalPartidas > 0 ? Math.round(aprobadas / totalPartidas * 100) : 0;
    const topCuellos = Object.values(cuellos).sort((a,b) => b.count - a.count).slice(0,6);

    let html = `
      <div class="dash-section">
        <div class="dash-section-title">Avance General</div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-label">Avance</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--success)">${aprobadas}</div><div class="stat-label">Aprobadas</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--warning)">${enRevision}</div><div class="stat-label">En Revisión</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--danger)">${observaciones}</div><div class="stat-label">Observaciones</div></div>
        </div>
        <div class="progress-wrap" style="height:10px">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="dash-section">
        <div class="dash-section-title">Cuellos de Botella — Partidas con más pendientes</div>
        ${topCuellos.length === 0 ? '<div style="color:var(--text2);font-size:13px">Sin cuellos de botella activos</div>' :
          topCuellos.map(c => `
            <div class="cuello-item">
              <div class="cuello-bar">
                <div class="cuello-label">${c.name}</div>
              </div>
              <div class="cuello-count">${c.count}</div>
            </div>`).join("")}
      </div>

      <div class="dash-section">
        <div class="dash-section-title">Módulos por Estado</div>
        ${modulos.map(m => {
          const partidas = m.tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
          const estados = m.estados || {};
          const ap = partidas.filter(p => estados[p.code] === "aprobado").length;
          const pct2 = Math.round(ap / partidas.length * 100);
          return `<div class="module-item" onclick="window._openModulo('${m.id}')">
            <div class="module-row">
              <div>
                <div class="module-name">${m.nombre}</div>
                <div class="module-meta"><span class="badge badge-${m.tipo}">${m.tipo==="seco"?"M1":"M2"}</span></div>
              </div>
              <div style="text-align:right">
                <div style="font-size:15px;font-weight:800;color:${pct2===100?'var(--success)':'var(--text)'}">${pct2}%</div>
              </div>
            </div>
            <div class="progress-wrap" style="margin-top:8px">
              <div class="progress-bar" style="width:${pct2}%;background:${pct2===100?'var(--success)':'var(--accent2)'}"></div>
            </div>
          </div>`;
        }).join("")}
      </div>`;

    c.innerHTML = html;
  });
  listeners.push(unsub);
}

// ─── HISTORIAL ────────────────────────────────────────────────────────────────
async function renderHistorial() {
  const c = document.getElementById("main-content");
  const q = query(collection(db, "historial"), orderBy("timestamp", "desc"));
  const snap = await getDocs(q);
  const items = snap.docs.map(d => d.data()).slice(0, 80);

  if (items.length === 0) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>
      <div class="empty-text">Sin historial aún</div></div>`;
    return;
  }

  const accionLabel = {
    ejecutado: "Marcó como ejecutado",
    aprobado_qc1: "Aprobó QC1",
    aprobado_qc2: "Aprobó QC2",
    aprobado_fto: "Aprobó FTO",
    observacion: "Registró observación",
  };

  c.innerHTML = `
    <div class="timeline" style="margin-top:8px">
      ${items.map(item => {
        const accion = accionLabel[item.accion] || item.accion;
        const color = item.accion === "observacion" ? "rejected" : item.accion.startsWith("aprobado") ? "done" : "pending";
        return `<div class="timeline-item">
          <div class="timeline-dot ${color}"></div>
          <div class="timeline-label">${item.usuario} · ${ROLES[item.rol]?.label || item.rol}</div>
          <div class="timeline-text">${accion} — <span style="font-family:monospace;font-size:11px">${item.partida}</span></div>
          ${item.observacion ? `<div style="font-size:11px;color:var(--danger);margin-top:2px">⚠ ${item.observacion}</div>` : ""}
          <div class="timeline-time">${item.moduloId}</div>
        </div>`;
      }).join("")}
    </div>`;
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function renderAdmin() {
  const c = document.getElementById("main-content");
  c.innerHTML = `
    <div class="admin-section">
      <div class="admin-title">Agregar Módulo a Planta</div>
      <div class="card">
        <div class="input-row">
          <input id="mod-nombre" placeholder="Ej: E01-P1-D1" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;outline:none;">
          <select id="mod-tipo">
            <option value="seco">M1 Seco</option>
            <option value="humedo">M2 Húmedo</option>
          </select>
        </div>
        <div class="input-row">
          <input id="mod-edificio" placeholder="Edificio (ej: E01)" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;outline:none;">
          <input id="mod-depto" placeholder="Depto (ej: P1-D1)" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;outline:none;">
        </div>
        <button class="btn" onclick="window._addModulo()">Agregar Módulo</button>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-title">Agregar Usuario</div>
      <div class="card">
        <div class="field"><label>NOMBRE</label><input id="user-nombre" placeholder="Nombre completo" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;width:100%;outline:none;"></div>
        <div class="field"><label>CORREO</label><input id="user-email" type="email" placeholder="correo@mail.com" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;width:100%;outline:none;"></div>
        <div class="field"><label>CONTRASEÑA INICIAL</label><input id="user-pass" placeholder="mínimo 6 caracteres" style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:13px;width:100%;outline:none;"></div>
        <div class="field">
          <label>ROL</label>
          <select id="user-rol" style="width:100%">
            ${Object.entries(ROLES).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join("")}
          </select>
        </div>
        <button class="btn" onclick="window._addUser()">Crear Usuario</button>
        <div class="err" id="user-err"></div>
      </div>
    </div>
  `;
}

window._addModulo = async () => {
  const nombre = document.getElementById("mod-nombre").value.trim();
  const tipo = document.getElementById("mod-tipo").value;
  const edificio = document.getElementById("mod-edificio").value.trim();
  const depto = document.getElementById("mod-depto").value.trim();
  if (!nombre) { alert("Escribe el nombre del módulo"); return; }

  const partidas = tipo === "seco" ? PARTIDAS_SECO : PARTIDAS_HUMEDO;
  const estados = {};
  partidas.forEach(p => { estados[p.code] = "pendiente"; });

  await addDoc(collection(db, "modulos"), {
    nombre, tipo, edificio, depto, activo: true,
    estados, tiempos: {}, observaciones: {},
    creado_at: serverTimestamp(), orden: Date.now(),
  });
  document.getElementById("mod-nombre").value = "";
  document.getElementById("mod-edificio").value = "";
  document.getElementById("mod-depto").value = "";
  alert(`Módulo ${nombre} agregado`);
};

window._addUser = async () => {
  const nombre = document.getElementById("user-nombre").value.trim();
  const email = document.getElementById("user-email").value.trim();
  const pass = document.getElementById("user-pass").value;
  const rol = document.getElementById("user-rol").value;
  const err = document.getElementById("user-err");
  err.textContent = "";

  if (!nombre || !email || !pass) { err.textContent = "Completa todos los campos"; return; }

  try {
    const { createUserWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, "users", cred.user.uid), { nombre, email, rol });
    err.style.color = "var(--success)";
    err.textContent = `Usuario ${nombre} creado`;
    document.getElementById("user-nombre").value = "";
    document.getElementById("user-email").value = "";
    document.getElementById("user-pass").value = "";
  } catch(e) {
    err.textContent = e.message;
  }
};

window.closeModal = closeModal;
</script>
</body>
</html>
